name: Release CLI

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - run: bun install

      - name: Build standalone binaries
        run: bun run build:binary

      - name: Generate checksums
        run: |
          cd dist
          sha256sum vidjutsu-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: VidJutsu ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/vidjutsu-darwin-arm64
            dist/vidjutsu-darwin-x64
            dist/vidjutsu-linux-x64
            dist/vidjutsu-linux-arm64
            dist/checksums.txt
